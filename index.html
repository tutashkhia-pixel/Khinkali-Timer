<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khinkali Timer</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Khinkali">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta property="og:image" content="logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f0c29;
      --card-bg: rgba(20, 20, 30, 0.4);
      --text-color: #f5f5f5;
      --accent-color: #a65cf1;
      --accent-hover: #b87df5;
      --glass-bg: rgba(20, 20, 30, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
      background-size: 400% 400%;
      animation: gradientBG 20s ease infinite;
      color: var(--text-color);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Top Bar */
    .top-bar {
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      z-index: 10;
    }

    .top-bar h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .top-bar .date-display {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
    }

    /* Dashboard Layout */
    .dashboard {
      display: grid;
      grid-template-columns: 320px 1fr 340px;
      gap: 2rem;
      padding: 1.5rem 2rem;
      flex: 1;
      height: calc(100vh - 70px);
      transition: all 0.3s ease;
    }

    .dashboard.hide-news {
      grid-template-columns: 1fr 340px;
    }

    .dashboard.hide-kanban {
      grid-template-columns: 320px 1fr;
    }

    .dashboard.hide-both {
      grid-template-columns: 1fr;
      max-width: 900px;
      margin: 0 auto;
    }

    .panel.hidden-panel {
      display: none !important;
    }

    .panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .panel-title {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 0.5rem;
      color: #a0e7e5;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Settings Menu */
    .settings-container {
      position: relative;
    }

    .settings-btn {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.2s;
      padding: 0;
      color: white;
      /* emoji fallback color */
    }

    .settings-btn:hover {
      opacity: 1;
      transform: rotate(45deg);
    }

    .settings-modal {
      position: absolute;
      top: 150%;
      right: 0;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.2rem;
      width: 250px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: opacity 0.2s, transform 0.2s;
      transform-origin: top right;
      color: var(--text-color);
    }

    .settings-modal.hidden {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }

    .settings-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--accent-color);
      margin-bottom: 5px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 8px;
    }

    /* Auto Hide Mode */
    .dashboard.focus-mode-active .news-panel,
    .dashboard.focus-mode-active .kanban-panel {
      display: none !important;
    }

    .dashboard.focus-mode-active {
      grid-template-columns: 1fr !important;
      max-width: 900px;
      margin: 0 auto;
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .setting-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent-color);
    }

    /* Left Panel: News */
    .news-feed {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }

    .news-feed::-webkit-scrollbar {
      width: 6px;
    }

    .news-feed::-webkit-scrollbar-track {
      background: transparent;
    }

    .news-feed::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    .news-item {
      margin-bottom: 1rem;
      padding: 0.8rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      transition: transform 0.2s, background 0.2s;
    }

    .news-item:hover {
      transform: translateX(4px);
      background: rgba(0, 0, 0, 0.4);
    }

    .news-item a {
      color: var(--text-color);
      text-decoration: none;
      font-size: 0.95rem;
      display: block;
      margin-bottom: 0.2rem;
    }

    .news-item a:hover {
      color: var(--accent-color);
    }

    .news-meta {
      font-size: 0.8rem;
      color: #888;
    }

    /* Center Panel: Khinkali Timer */
    .timer-panel {
      text-align: center;
      justify-content: center;
      align-items: center;
      background: transparent;
      border: none;
      backdrop-filter: none;
      box-shadow: none;
    }

    .greeting {
      font-size: 3.5rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
      letter-spacing: -1.5px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 1rem;
    }

    .timer {
      font-size: 9rem;
      font-weight: 200;
      margin-top: 0;
      line-height: 1;
      letter-spacing: -4px;
      text-shadow: 0 0 30px rgba(160, 231, 229, 0.2);
      font-variant-numeric: tabular-nums;
    }

    .timer-urgent {
      color: #ff5555;
      text-shadow: 0 0 20px rgba(255, 85, 85, 0.4);
      animation: pulseRed 2s infinite;
    }

    @keyframes pulseRed {

      0%,
      100% {
        opacity: 1;
        text-shadow: 0 0 20px rgba(255, 85, 85, 0.4);
      }

      50% {
        opacity: 0.8;
        text-shadow: 0 0 35px rgba(255, 85, 85, 0.7);
      }
    }

    /* Reactive Khinkali */
    .khinkali-container {
      position: relative;
      display: inline-block;
      margin: 1rem auto 1.5rem auto;
    }

    .khinkali {
      width: 100px;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.6));
      opacity: 0.9;
      transition: filter 0.5s ease, opacity 0.5s ease;
    }

    .khinkali.cooked {
      filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.8)) brightness(1.2);
      opacity: 1;
      animation: none;
    }

    .steam {
      position: absolute;
      top: -20px;
      left: 50%;
      width: 10px;
      height: 10px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      filter: blur(4px);
      transform: translateX(-50%);
      animation: steamRise 2s ease-out forwards;
      pointer-events: none;
    }

    @keyframes steamRise {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(0) scale(1);
      }

      20% {
        opacity: 0.8;
      }

      100% {
        opacity: 0;
        transform: translateX(calc(-50% + 15px)) translateY(-40px) scale(3);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .timer-controls {
      margin-top: 2rem;
      width: 100%;
      max-width: 400px;
    }

    #timeInput {
      padding: 12px;
      font-size: 16px;
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.3);
      color: white;
      margin-bottom: 1rem;
      text-align: center;
    }

    #timeInput:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      background-color: var(--accent-color);
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      flex: 1;
      font-weight: 500;
    }

    button:hover {
      background-color: var(--accent-hover);
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    .tag-group {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .tag-btn {
      padding: 6px 12px;
      font-size: 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      transition: all 0.2s;
      flex: none;
    }

    .tag-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .tag-btn.active {
      background: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
    }

    .focus-stats-container {
      position: relative;
      cursor: help;
    }

    .focus-tooltip {
      visibility: hidden;
      background-color: var(--card-bg);
      color: var(--text-color);
      text-align: left;
      border-radius: 8px;
      padding: 10px;
      position: absolute;
      z-index: 100;
      bottom: 125%;
      right: 0;
      width: max-content;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      opacity: 0;
      transition: opacity 0.3s;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }

    .focus-stats-container:hover .focus-tooltip {
      visibility: visible;
      opacity: 1;
    }

    #statusMessage {
      margin-top: 1.5rem;
      font-size: 1.2rem;
      color: #a0e7e5;
      min-height: 1.5rem;
    }

    /* Right Panel: Kanban */
    .kanban-board {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
      overflow-y: hidden;
    }

    .kanban-input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .kanban-input-group input {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      color: white;
    }

    .kanban-input-group button {
      flex: none;
      padding: 8px 12px;
      font-size: 14px;
    }

    .kanban-columns {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }

    .kanban-columns::-webkit-scrollbar {
      width: 6px;
    }

    .kanban-columns::-webkit-scrollbar-track {
      background: transparent;
    }

    .kanban-columns::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    .kanban-column {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 0.8rem;
      min-height: 120px;
      display: flex;
      flex-direction: column;
    }

    .kanban-column-header {
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 0.8rem;
      color: var(--text-color);
      display: flex;
      justify-content: space-between;
    }

    .kanban-cards {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 30px;
    }

    .kanban-card {
      background: var(--card-bg);
      padding: 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: grab;
      border: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      word-break: break-word;
    }

    .kanban-card:active {
      cursor: grabbing;
    }

    .kanban-card.dragging {
      opacity: 0.5;
    }

    .kanban-column.drag-over {
      background: rgba(166, 92, 241, 0.1);
      border: 1px dashed var(--accent-color);
    }

    .delete-task {
      cursor: pointer;
      color: #ff5555;
      font-size: 1.2rem;
      line-height: 1;
      padding-left: 5px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .kanban-card:hover .delete-task {
      opacity: 1;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      opacity: 0.7;
      background: var(--card-bg);
      border-top: 1px solid var(--glass-border);
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .dashboard {
        grid-template-columns: 250px 1fr 280px;
        gap: 1rem;
        padding: 1rem;
      }

      .dashboard.hide-news {
        grid-template-columns: 1fr 280px;
      }

      .dashboard.hide-kanban {
        grid-template-columns: 250px 1fr;
      }
    }

    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 1fr;
        height: auto;
        overflow-y: auto;
        gap: 1.5rem;
        padding: 1rem;
      }

      body {
        overflow-y: auto;
        height: auto;
      }

      .panel {
        min-height: auto;
      }

      .timer {
        font-size: 6rem;
      }

      .greeting {
        font-size: 2.5rem;
      }

      .top-bar {
        padding: 1rem;
      }

      .timer-panel {
        order: 1;
      }

      .kanban-panel {
        order: 2;
      }

      .news-panel {
        order: 3;
      }
    }

    @media (max-width: 600px) {
      .timer {
        font-size: 4.5rem;
        letter-spacing: -2px;
      }

      .greeting {
        font-size: 2rem;
      }

      .top-bar h2 {
        font-size: 1rem;
      }

      .top-bar .date-display {
        font-size: 0.9rem;
      }

      .khinkali {
        width: 80px;
        margin-bottom: 1rem;
      }

      .dashboard {
        padding: 0.5rem;
        gap: 1rem;
      }

      .panel {
        padding: 1rem;
      }
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <h2>Khinkali Dash</h2>
    <div style="display: flex; gap: 20px; align-items: center;">
      <!-- Gamification Stats -->
      <div id="statsContainer"
        style="display: flex; gap: 15px; font-weight: 500; font-size: 1.1rem; opacity: 0.9; align-items: center;">
        <div id="khinkaliCount"
          style="color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.3); transition: transform 0.3s; display: flex; align-items: center; gap: 5px;">
          <img src="logo.png" style="width: 20px; height: 20px; filter: drop-shadow(0 0 5px rgba(255,215,0,0.5));"
            alt="icon" /> <span id="khinkaliCountText">0 Cooked</span>
        </div>
        <div id="fireStreak" style="color: #ff7b00; text-shadow: 0 0 10px rgba(255,123,0,0.3); display: none;">🔥 0 Day
          Streak</div>
      </div>
      <div class="date-display" id="currentDate">Loading date...</div>
      <div class="settings-container">
        <button id="settingsBtn" onclick="toggleSettings()" class="settings-btn">⚙️</button>
        <div id="settingsModal" class="settings-modal hidden">
          <div class="settings-title">Dash Settings</div>
          <label class="setting-row">
            <input type="checkbox" id="toggleNews" checked onchange="updateSettings()"> Show Tech News
          </label>
          <label class="setting-row">
            <input type="checkbox" id="toggleKanban" checked onchange="updateSettings()"> Show Workday Planner
          </label>
          <label class="setting-row">
            <input type="checkbox" id="toggleAutoHide" onchange="updateSettings()"> Auto-hide during focus
          </label>
          <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 5px 0;">
          <button onclick="playStartSound()"
            style="padding: 6px; font-size: 0.9em; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 4px; color: white; cursor: pointer;">🔊
            Test Alarm Sound</button>
        </div>
      </div>
    </div>
  </div>

  <div class="dashboard">

    <!-- Left Panel: Hacker News -->
    <div class="panel news-panel">
      <div class="panel-title">Tech News</div>
      <div class="news-feed" id="newsFeed">
        <div style="text-align:center; padding: 20px; opacity: 0.6;">Loading top stories...</div>
      </div>
    </div>

    <!-- Center Panel: Timer (Dropzone for Tasks) -->
    <div class="panel timer-panel" id="timerPanelDropzone" ondragover="allowDropToTimer(event)"
      ondragleave="dragLeaveTimer(event)" ondrop="dropToTimer(event)" style="transition: border 0.2s, background 0.2s;">
      <div id="greetingText" class="greeting">Good day.</div>
      <div id="khinkaliContainer" class="khinkali-container" style="pointer-events: none;">
        <img src="logo.png" alt="Khinkali" id="khinkaliIcon" class="khinkali" />
      </div>
      <div id="countdown" class="timer">00:00</div>
      <div id="statusMessage">Ready to focus.</div>

      <div class="timer-controls">
        <input id="timeInput" placeholder="Time (e.g. 25m, 1h30m, 90s)" autocomplete="off" />
        <div class="button-group">
          <button onclick="startTimer()">Start</button>
          <button id="pauseBtn" onclick="togglePause()">Pause</button>
          <button onclick="resetTimer()">Reset</button>
        </div>

        <div class="tag-group" id="tagGroup">
          <button class="tag-btn active" onclick="selectTag(this, 'Work')">💻 Work</button>
          <button class="tag-btn" onclick="selectTag(this, 'Study')">📚 Study</button>
          <button class="tag-btn" onclick="selectTag(this, 'Coding')">🧠 Coding</button>
          <button class="tag-btn" onclick="selectTag(this, 'Chores')">🛠 Chores</button>
          <button class="tag-btn" onclick="selectTag(this, 'Rest')">🧘 Rest</button>
        </div>

        <div
          style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <button id="ambientBtn" onclick="toggleAmbientNoise()"
              style="background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 6px 12px; font-size: 14px; flex: none;">🎧
              Rain: Off</button>
            <input type="range" id="rainVolume" min="0" max="1" step="0.05" value="1"
              style="width: 70px; accent-color: var(--accent-color);" onchange="updateAmbientVolume()">

            <button id="lofiBtn" onclick="toggleLofi()"
              style="background: transparent; border: 1px solid #FFD700; color: #FFD700; padding: 6px 12px; font-size: 14px; flex: none; margin-left: 10px;">📻
              Lo-Fi Radio</button>
          </div>
          <div class="focus-stats-container" style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">Focused today:
            <span id="dailyFocusVal" style="font-weight: bold; color: #a0e7e5;">0m</span>
            <div class="focus-tooltip" id="focusTooltip">No focus data yet.</div>
          </div>
        </div>

        <button id="stopAlarmBtn" onclick="stopAlarmSound()"
          style="display:none; width:100%; margin-top:10px; background:#ff5555;">Stop Alarm</button>

        <!-- Deep Integration: Lo-Fi Radio -->
        <div id="lofiWrapper"
          style="display: none; margin-top: 15px; border-radius: 8px; overflow: hidden; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); transition: all 0.3s ease;">
          <iframe width="100%" height="150" src="https://www.youtube.com/embed/jfKfPfyJRdk?enablejsapi=1"
            title="Lofi Radio" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen style="display: block;"></iframe>
        </div>
      </div>
    </div>

    <!-- Right Panel: Kanban Board -->
    <div class="panel kanban-panel">
      <div class="panel-title">Workday Planner</div>
      <div class="kanban-board">
        <div class="kanban-input-group">
          <input type="text" id="newTaskInput" placeholder="Add a new task..." autocomplete="off" />
          <input type="number" id="newTaskEst" placeholder="Est. 🥟" min="1" max="10"
            style="flex: none; width: 70px; text-align: center; border-radius: 6px; border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.2); color: white;"
            title="Estimated Khinkalis (Pomodoros)">
          <button onclick="addTask()">Add</button>
        </div>

        <div class="kanban-columns">
          <div class="kanban-column" id="col-todo">
            <div class="kanban-column-header">To Do <span id="count-todo">0</span></div>
            <div class="kanban-cards" id="cards-todo" data-status="todo"></div>
          </div>

          <div class="kanban-column" id="col-progress">
            <div class="kanban-column-header">In Progress <span id="count-progress">0</span></div>
            <div class="kanban-cards" id="cards-progress" data-status="progress"></div>
          </div>

          <div class="kanban-column" id="col-done">
            <div class="kanban-column-header" style="color:#a0e7e5;">Done <span id="count-done">0</span></div>
            <div class="kanban-cards" id="cards-done" data-status="done"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="footer">
    <small style="opacity: 0.5;">Khinkali Dash v1000</small>
  </div>

  <script>
    // --- Gamification & Stats Engine ---
    let userStats = JSON.parse(localStorage.getItem('khinkaliUserStats')) || {
      totalKhinkalisCooked: 0,
      todayKhinkalis: 0,
      lastFocusDate: null,
      currentStreak: 0
    };

    function getLocalDateString() {
      // Returns YYYY-MM-DD based on local timezone, not UTC
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split('T')[0];
    }

    function renderStatsUI(animate = false) {
      const todayDate = getLocalDateString();

      // Reset daily count if it's a new day
      if (userStats.lastFocusDate && userStats.lastFocusDate !== todayDate) {
        userStats.todayKhinkalis = 0;
      }

      const countEl = document.getElementById('khinkaliCount');
      const streakEl = document.getElementById('fireStreak');

      countEl.textContent = `🥟 ${userStats.totalKhinkalisCooked} Cooked`;

      if (userStats.currentStreak > 0) {
        streakEl.style.display = 'block';
        streakEl.textContent = `🔥 ${userStats.currentStreak} Day Streak`;
      } else {
        streakEl.style.display = 'none';
      }

      if (animate) {
        countEl.style.transform = 'scale(1.5)';
        setTimeout(() => countEl.style.transform = 'scale(1)', 300);
      }
    }

    function checkAndCookKhinkali() {
      const todayDate = getLocalDateString();
      userStats.totalKhinkalisCooked += 1;
      userStats.todayKhinkalis += 1;

      if (!userStats.lastFocusDate) {
        // First time ever focusing
        userStats.currentStreak = 1;
        userStats.lastFocusDate = todayDate;
      } else if (userStats.lastFocusDate !== todayDate) {
        // Did they focus exactly yesterday?
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        yesterday.setMinutes(yesterday.getMinutes() - yesterday.getTimezoneOffset());
        const yesterdayStr = yesterday.toISOString().split('T')[0];

        if (userStats.lastFocusDate === yesterdayStr) {
          // Continued Streak
          userStats.currentStreak += 1;
        } else {
          // Streak Broken
          userStats.currentStreak = 1;
        }
        userStats.lastFocusDate = todayDate;
      }

      localStorage.setItem('khinkaliUserStats', JSON.stringify(userStats));
      renderStatsUI(true);
    }

    renderStatsUI();

    // --- Ambient Noise & Focus Tracking ---

    // Migrate old integer storage to JSON object format if necessary
    let initialFocusStorage = localStorage.getItem('khinkaliDailyFocus');
    let dailyFocusData;
    try {
      if (initialFocusStorage && !initialFocusStorage.startsWith('{')) {
        // Migration from old simple integer
        dailyFocusData = { total: parseInt(initialFocusStorage) || 0, tags: { "Work": parseInt(initialFocusStorage) || 0 } };
      } else {
        dailyFocusData = JSON.parse(initialFocusStorage) || { total: 0, tags: {} };
      }
    } catch (e) {
      dailyFocusData = { total: 0, tags: {} };
    }

    let dailyFocusedSeconds = dailyFocusData.total;
    let currentInitialSeconds = 0; // Tracks the initially requested time to add it when finished
    let currentActiveTag = 'Work'; // Default tag

    const ambientAudio = new Audio('sample.mp3');
    ambientAudio.loop = true;
    let isAmbientPlaying = false;

    // Handle tag selection
    function selectTag(btn, tag) {
      document.querySelectorAll('.tag-btn').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      currentActiveTag = tag;
    }

    function renderDailyFocus() {
      const displayVal = document.getElementById('dailyFocusVal');
      const tooltip = document.getElementById('focusTooltip');

      const totalH = Math.floor(dailyFocusData.total / 3600);
      const totalM = Math.floor((dailyFocusData.total % 3600) / 60);
      if (totalH > 0) {
        displayVal.textContent = `${totalH}h ${totalM}m`;
      } else {
        displayVal.textContent = `${totalM}m`;
      }

      // Build Tooltip breakdown
      let tooltipText = "Focus Breakdown:\n";
      let hasTags = false;
      const emojis = { "Work": "💻", "Study": "📚", "Coding": "🧠", "Chores": "🛠", "Rest": "🧘" };
      for (const [tag, seconds] of Object.entries(dailyFocusData.tags)) {
        if (seconds > 0) {
          hasTags = true;
          const h = Math.floor(seconds / 3600);
          const m = Math.floor((seconds % 3600) / 60);
          const timeStr = h > 0 ? `${h}h ${m}m` : `${m}m`;
          tooltipText += `${emojis[tag] || '🏷'} ${tag}: ${timeStr}\n`;
        }
      }
      tooltip.textContent = hasTags ? tooltipText.trim() : "No categorized focus data yet.";
    }
    renderDailyFocus();

    function toggleAmbientNoise() {
      const btn = document.getElementById('ambientBtn');
      if (isAmbientPlaying) {
        ambientAudio.pause();
        btn.textContent = '🎧 Rain: Off';
        btn.style.background = 'transparent';
        btn.style.color = 'var(--accent-color)';
      } else {
        ambientAudio.play().catch(e => console.error("Audio block:", e));
        btn.textContent = '🎧 Rain: On';
        btn.style.background = 'var(--accent-color)';
        btn.style.color = 'white';
      }
      isAmbientPlaying = !isAmbientPlaying;
    }

    function updateAmbientVolume() {
      ambientAudio.volume = document.getElementById('rainVolume').value;
    }

    let isLofiVisible = false;
    function toggleLofi() {
      const btn = document.getElementById('lofiBtn');
      const wrapper = document.getElementById('lofiWrapper');

      if (isLofiVisible) {
        wrapper.style.display = 'none';
        btn.style.background = 'transparent';
        btn.style.color = '#FFD700';
      } else {
        wrapper.style.display = 'block';
        btn.style.background = '#FFD700';
        btn.style.color = '#000';
      }
      isLofiVisible = !isLofiVisible;
    }

    function addFocusedTime(secondsAdded) {
      dailyFocusData.total += secondsAdded;
      if (!dailyFocusData.tags[currentActiveTag]) {
        dailyFocusData.tags[currentActiveTag] = 0;
      }
      dailyFocusData.tags[currentActiveTag] += secondsAdded;

      localStorage.setItem('khinkaliDailyFocus', JSON.stringify(dailyFocusData));
      renderDailyFocus();
    }

    // --- Core Timer Logic (Pro Web Worker Edition) ---
    const timerWorker = new Worker('timerWorker.js');
    let targetEndTime = 0;
    let totalDurationSeconds = 0;
    let isPaused = false;
    let remainingWhenPaused = 0; // Stores remaining ms when paused

    // We maintain 'seconds' mathematically as remaining seconds purely for display updates 
    let seconds = 0;

    const display = document.getElementById("countdown");
    const statusMessage = document.getElementById("statusMessage");
    const pauseBtn = document.getElementById("pauseBtn");
    const timeInput = document.getElementById("timeInput");

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep(frequency, type, duration) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = type;
      oscillator.frequency.value = frequency;

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
      oscillator.stop(audioCtx.currentTime + duration);
    }

    function playStartSound() { playBeep(440, 'sine', 0.2); setTimeout(() => playBeep(660, 'sine', 0.3), 200); }
    function playPauseSound() { playBeep(330, 'triangle', 0.2); }
    function playResumeSound() { playBeep(550, 'triangle', 0.2); }
    function playResetSound() { playBeep(330, 'sawtooth', 0.2); setTimeout(() => playBeep(220, 'sawtooth', 0.4), 200); }

    function updateDisplay(overrideSeconds) {
      let calcSeconds = overrideSeconds !== undefined ? overrideSeconds : seconds;

      const h = Math.floor(calcSeconds / 3600);
      const m = Math.floor((calcSeconds % 3600) / 60);
      const s = calcSeconds % 60;

      const mins = String(m).padStart(2, '0');
      const secs = String(s).padStart(2, '0');

      if (h > 0) {
        const displayStr = `${h}:${mins}:${secs}`;
        display.textContent = displayStr;
        document.title = `(${displayStr}) Khinkali Dash`;
      } else {
        const displayStr = `${mins}:${secs}`;
        display.textContent = displayStr;
        if (calcSeconds > 0) {
          document.title = `(${displayStr}) Khinkali Dash`;
        } else {
          document.title = `Khinkali Dash`;
        }
      }

      // UX: Color States for Urgency (last 60s)
      if (calcSeconds <= 60 && calcSeconds > 0) {
        display.classList.add('timer-urgent');
      } else {
        display.classList.remove('timer-urgent');
      }
    }

    function playSound() {
      const beep = document.getElementById("alarm-sound");
      beep.play().catch(e => console.error(e));
      document.getElementById('stopAlarmBtn').style.display = 'inline-block';
    }

    function stopAlarmSound() {
      const beep = document.getElementById("alarm-sound");
      beep.pause();
      beep.currentTime = 0;
      document.getElementById('stopAlarmBtn').style.display = 'none';
      if (isAmbientPlaying) {
        ambientAudio.pause();
        document.getElementById('ambientBtn').textContent = '🎧 Rain: Off';
        document.getElementById('ambientBtn').style.background = 'transparent';
        document.getElementById('ambientBtn').style.color = 'var(--accent-color)';
        isAmbientPlaying = false;
      }
    }

    function parseTime(input) {
      let totalS = 0;
      const pattern = /(\d+)([hms])/gi;
      let match;
      while ((match = pattern.exec(input)) !== null) {
        const val = parseInt(match[1]);
        const unit = match[2].toLowerCase();
        if (unit === 'h') totalS += val * 3600;
        else if (unit === 'm') totalS += val * 60;
        else if (unit === 's') totalS += val;
      }
      return totalS;
    }

    function saveTimerState() {
      if (seconds <= 0 && !isPaused) {
        localStorage.removeItem('khinkaliActiveTimer');
        return;
      }
      const state = {
        targetEndTime: targetEndTime,
        totalDurationSeconds: totalDurationSeconds,
        isPaused: isPaused,
        remainingWhenPaused: remainingWhenPaused,
        currentActiveTag: currentActiveTag
      };
      localStorage.setItem('khinkaliActiveTimer', JSON.stringify(state));
    }

    function loadTimerState() {
      const saved = localStorage.getItem('khinkaliActiveTimer');
      if (saved) {
        try {
          const state = JSON.parse(saved);
          totalDurationSeconds = state.totalDurationSeconds;
          currentActiveTag = state.currentActiveTag;
          // visually update the pill button
          document.querySelectorAll('.tag-btn').forEach(btn => {
            if (btn.textContent.includes(currentActiveTag)) selectTag(btn, currentActiveTag);
          });

          if (state.isPaused) {
            isPaused = true;
            remainingWhenPaused = state.remainingWhenPaused;
            seconds = Math.ceil(remainingWhenPaused / 1000);
            updateDisplay(seconds);
            pauseBtn.textContent = "Resume";
            statusMessage.textContent = "⏸ Paused (Recovered)";
          } else {
            // It was running
            const now = Date.now();
            if (state.targetEndTime > now) {
              targetEndTime = state.targetEndTime;
              isPaused = false;
              pauseBtn.textContent = "Pause";
              statusMessage.textContent = "⏱ Timer resumed from background!";
              timerWorker.postMessage({ command: 'start' });
            } else {
              // Time expired while afk
              localStorage.removeItem('khinkaliActiveTimer');
            }
          }
        } catch (e) {
          console.error("Failed to load timer state", e);
        }
      }
    }

    let steamInterval = null;
    function spawnSteam() {
      const container = document.getElementById('khinkaliContainer');
      const steam = document.createElement('div');
      steam.className = 'steam';
      steam.style.left = 40 + Math.random() * 20 + '%';
      container.appendChild(steam);
      setTimeout(() => steam.remove(), 2000);
    }

    function finishTimer() {
      timerWorker.postMessage({ command: 'stop' });
      clearInterval(steamInterval);
      document.getElementById('khinkaliIcon').classList.add('cooked');
      document.querySelector('.dashboard').classList.remove('focus-mode-active');
      seconds = 0;
      updateDisplay(seconds);
      addFocusedTime(totalDurationSeconds);
      checkAndCookKhinkali(); // Gamification Hook

      // Smart Kanban Hook
      if (activeDragedTaskId) {
        const taskIndex = tasks.findIndex(t => t.id === activeDragedTaskId);
        if (taskIndex !== -1) {
          tasks[taskIndex].actual = (tasks[taskIndex].actual || 0) + 1;
          saveTasks(); // Re-renders the board with updated stats
        }
        activeDragedTaskId = null; // Clear it for the next timer
        statusMessage.textContent = "✅ Task session complete!";
      } else {
        statusMessage.textContent = "✅ Time’s up!";
      }

      playSound();
      localStorage.removeItem('khinkaliActiveTimer');
    }

    timerWorker.onmessage = function (e) {
      if (e.data === 'tick') {
        const now = Date.now();
        const remainingMs = targetEndTime - now;
        if (remainingMs <= 0) {
          finishTimer();
        } else {
          // Only update mathematically if the ceiling of remaining seconds actually changed
          const newSeconds = Math.ceil(remainingMs / 1000);
          if (newSeconds !== seconds) {
            seconds = newSeconds;
            updateDisplay(seconds);
          }
        }
      }
    };

    function startTimer() {
      timerWorker.postMessage({ command: 'stop' });
      stopAlarmSound();
      let input = timeInput.value.trim();

      if (/^\d+:\d+$/.test(input)) {
        const parts = input.split(':');
        input = `${parts[0]}m${parts[1]}s`;
      } else if (/^\d+$/.test(input)) {
        input += 'm'; // Interpret plain numbers as minutes
      } else if (/^\d+\s+\d+$/.test(input)) {
        const parts = input.split(/\s+/);
        input = `${parts[0]}m${parts[1]}s`;
      }

      const totalS = parseTime(input);
      if (!totalS) {
        alert("Please enter a valid time (e.g. 17m30s, 1h, or 90s).");
        return;
      }

      console.log("✅ Timer started with:", input);
      totalDurationSeconds = totalS;
      targetEndTime = Date.now() + (totalS * 1000);
      seconds = totalS;

      updateDisplay(seconds);
      isPaused = false;
      pauseBtn.textContent = "Pause";
      statusMessage.textContent = "⏱ Timer started!";

      if (zenSettings.autoHide) {
        document.querySelector('.dashboard').classList.add('focus-mode-active');
      }

      document.getElementById('khinkaliIcon').classList.remove('cooked');
      steamInterval = setInterval(spawnSteam, 600);
      playStartSound();
      saveTimerState();
      timerWorker.postMessage({ command: 'start' });
    }

    function togglePause() {
      if (seconds <= 0) return;
      isPaused = !isPaused;

      if (isPaused) {
        timerWorker.postMessage({ command: 'stop' });
        clearInterval(steamInterval);
        document.querySelector('.dashboard').classList.remove('focus-mode-active');
        remainingWhenPaused = targetEndTime - Date.now();
        statusMessage.textContent = "⏸ Paused";
        pauseBtn.textContent = "Resume";
        playPauseSound();
      } else {
        // Resuming
        if (zenSettings.autoHide) document.querySelector('.dashboard').classList.add('focus-mode-active');
        steamInterval = setInterval(spawnSteam, 600);
        targetEndTime = Date.now() + remainingWhenPaused;
        statusMessage.textContent = "▶️ Resumed";
        pauseBtn.textContent = "Pause";
        playResumeSound();
        timerWorker.postMessage({ command: 'start' });
      }
      saveTimerState();
    }

    function resetTimer() {
      timerWorker.postMessage({ command: 'stop' });
      clearInterval(steamInterval);
      document.getElementById('khinkaliIcon').classList.remove('cooked');
      document.querySelector('.dashboard').classList.remove('focus-mode-active');
      const currentRemaining = isPaused ? remainingWhenPaused : (targetEndTime - Date.now());
      const currentRemainingSeconds = Math.ceil(currentRemaining / 1000);

      if (seconds > 0 && totalDurationSeconds > currentRemainingSeconds) {
        // Appreciate partial time if reset midway
        addFocusedTime(totalDurationSeconds - currentRemainingSeconds);
      }

      seconds = 0;
      targetEndTime = 0;
      updateDisplay(seconds);
      isPaused = false;
      pauseBtn.textContent = "Pause";
      statusMessage.textContent = "🔁 Timer reset.";
      stopAlarmSound();
      playResetSound();
      localStorage.removeItem('khinkaliActiveTimer');
    }

    // Initialize Timer from LocalStorage on load
    loadTimerState();
    updateDisplay();

    timeInput.addEventListener('keydown', function (event) {
      if (event.code === 'Enter') {
        timeInput.blur();
        startTimer();
      }
    });

    document.addEventListener('keydown', function (event) {
      if (event.code === 'Space' || event.key === ' ') {
        if (document.activeElement.tagName !== 'INPUT') {
          event.preventDefault(); // Prevent default spacebar action (scrolling)
          if (seconds <= 0) {
            startTimer();
          } else {
            togglePause();
          }
        }
      }
    });

    // --- Date Display ---
    function updateDate() {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString(undefined, options);
    }
    updateDate();

    // --- Dynamic Greeting ---
    function updateGreeting() {
      const hour = new Date().getHours();
      let greeting = "Good evening";
      if (hour < 5) greeting = "Good night";
      else if (hour < 12) greeting = "Good morning";
      else if (hour < 18) greeting = "Good afternoon";
      document.getElementById('greetingText').textContent = greeting + ", focus time.";
    }
    updateGreeting();
    // Update every minute to catch hour changes
    setInterval(updateGreeting, 60000);

    // --- Zen Mode Settings ---
    const settingsModal = document.getElementById('settingsModal');
    const toggleNewsCheckbox = document.getElementById('toggleNews');
    const toggleKanbanCheckbox = document.getElementById('toggleKanban');
    const newsPanel = document.querySelector('.news-panel');
    const kanbanPanel = document.querySelector('.kanban-panel');
    const dashboardContainer = document.querySelector('.dashboard');

    let zenSettings = JSON.parse(localStorage.getItem('khinkaliZenSettings')) || {
      showNews: true,
      showKanban: true,
      autoHide: false
    };

    function toggleSettings() {
      settingsModal.classList.toggle('hidden');
    }

    // Close modal when clicking outside
    document.addEventListener('click', (e) => {
      const btn = document.getElementById('settingsBtn');
      if (!settingsModal.contains(e.target) && !btn.contains(e.target)) {
        settingsModal.classList.add('hidden');
      }
    });

    function updateSettings() {
      zenSettings.showNews = toggleNewsCheckbox.checked;
      zenSettings.showKanban = toggleKanbanCheckbox.checked;
      zenSettings.autoHide = document.getElementById('toggleAutoHide').checked;
      localStorage.setItem('khinkaliZenSettings', JSON.stringify(zenSettings));
      applySettings();
    }

    function applySettings() {
      toggleNewsCheckbox.checked = zenSettings.showNews;
      toggleKanbanCheckbox.checked = zenSettings.showKanban;
      document.getElementById('toggleAutoHide').checked = zenSettings.autoHide;

      if (zenSettings.showNews) {
        newsPanel.classList.remove('hidden-panel');
      } else {
        newsPanel.classList.add('hidden-panel');
      }

      if (zenSettings.showKanban) {
        kanbanPanel.classList.remove('hidden-panel');
      } else {
        kanbanPanel.classList.add('hidden-panel');
      }

      dashboardContainer.classList.remove('hide-news', 'hide-kanban', 'hide-both');
      if (!zenSettings.showNews && !zenSettings.showKanban) {
        dashboardContainer.classList.add('hide-both');
      } else if (!zenSettings.showNews) {
        dashboardContainer.classList.add('hide-news');
      } else if (!zenSettings.showKanban) {
        dashboardContainer.classList.add('hide-kanban');
      }
    }

    applySettings(); // Initialize on load

    // --- News Widget (Hacker News API) ---
    async function fetchNews() {
      const newsFeed = document.getElementById('newsFeed');
      try {
        const response = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
        const storyIds = await response.json();

        const top8Ids = storyIds.slice(0, 8);
        const storyPromises = top8Ids.map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(res => res.json()));
        const stories = await Promise.all(storyPromises);

        newsFeed.innerHTML = '';
        stories.forEach(story => {
          if (!story) return;
          const div = document.createElement('div');
          div.className = 'news-item';
          const domain = story.url ? new URL(story.url).hostname.replace('www.', '') : 'news.yCombinator.com';
          div.innerHTML = `
            <a href="${story.url || `https://news.ycombinator.com/item?id=${story.id}`}" target="_blank" rel="noopener">${story.title}</a>
            <div class="news-meta">${story.score} points • by ${story.by} • ${domain}</div>
          `;
          newsFeed.appendChild(div);
        });
      } catch (e) {
        console.error("News fetch error:", e);
        newsFeed.innerHTML = '<div style="text-align:center; padding: 20px; color:#ff5555;">Could not load news. Check connection.</div>';
      }
    }
    fetchNews();

    // --- Kanban Board Logic ---
    let tasks = JSON.parse(localStorage.getItem('khinkaliTasks')) || [
      { id: 't1', text: 'Plan workday', status: 'todo' },
      { id: 't2', text: 'Review code', status: 'progress' }
    ];

    function saveTasks() {
      localStorage.setItem('khinkaliTasks', JSON.stringify(tasks));
      renderTasks();
    }

    function renderTasks() {
      document.getElementById('cards-todo').innerHTML = '';
      document.getElementById('cards-progress').innerHTML = '';
      document.getElementById('cards-done').innerHTML = '';

      let counts = { todo: 0, progress: 0, done: 0 };

      tasks.forEach(task => {
        counts[task.status]++;
        const card = document.createElement('div');
        card.className = 'kanban-card';
        card.draggable = true;
        card.dataset.id = task.id;
        card.innerHTML = `
          <span>${task.text}</span>
          <div style="display:flex; align-items:center; gap:8px;">
            ${task.estimated ? `<span style="font-size:0.8rem; opacity:0.7; color:#FFD700;">(${task.actual || 0}/${task.estimated} 🥟)</span>` : ''}
            <span class="delete-task" onclick="deleteTask('${task.id}')">&times;</span>
          </div>
        `;

        card.addEventListener('dragstart', dragStart);
        card.addEventListener('dragend', dragEnd);

        document.getElementById(`cards-${task.status}`).appendChild(card);
      });

      document.getElementById('count-todo').textContent = counts.todo;
      document.getElementById('count-progress').textContent = counts.progress;
      document.getElementById('count-done').textContent = counts.done;
    }

    function addTask() {
      const input = document.getElementById('newTaskInput');
      const text = input.value.trim();
      const estInput = document.getElementById('newTaskEst').value;
      if (!text) return;

      tasks.push({
        id: 'task_' + Date.now(),
        text: text,
        status: 'todo',
        estimated: parseInt(estInput) || null,
        actual: 0
      });

      input.value = '';
      document.getElementById('newTaskEst').value = '';
      saveTasks();
    }

    window.addTask = addTask;
    window.deleteTask = deleteTask;

    document.getElementById('newTaskInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addTask();
    });

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
    }

    // Drag and Drop Logic
    let draggedCard = null;

    function dragStart(e) {
      draggedCard = this;
      setTimeout(() => this.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    }

    function dragEnd() {
      this.classList.remove('dragging');
      draggedCard = null;
      document.querySelectorAll('.kanban-column').forEach(col => col.classList.remove('drag-over'));
    }

    document.querySelectorAll('.kanban-cards').forEach(container => {
      const column = container.parentElement;

      column.addEventListener('dragover', e => {
        e.preventDefault();
        column.classList.add('drag-over');
      });

      column.addEventListener('dragleave', () => {
        column.classList.remove('drag-over');
      });

      column.addEventListener('drop', e => {
        e.preventDefault();
        column.classList.remove('drag-over');

        if (draggedCard) {
          const newStatus = container.dataset.status;
          const taskId = draggedCard.dataset.id;

          const taskIndex = tasks.findIndex(t => t.id === taskId);
          if (taskIndex !== -1 && tasks[taskIndex].status !== newStatus) {
            tasks[taskIndex].status = newStatus;
            saveTasks();
          }
        }
      });
    });

    // --- Drag to Timer Logic ---
    let activeDragedTaskId = null; // Stores the task running on the timer

    function allowDropToTimer(e) {
      e.preventDefault();
      document.getElementById('timerPanelDropzone').style.background = 'rgba(160, 231, 229, 0.1)';
      document.getElementById('timerPanelDropzone').style.border = '1px solid #a0e7e5';
    }

    function dragLeaveTimer(e) {
      document.getElementById('timerPanelDropzone').style.background = 'var(--glass-bg)';
      document.getElementById('timerPanelDropzone').style.border = '1px solid var(--glass-border)';
    }

    function dropToTimer(e) {
      e.preventDefault();
      dragLeaveTimer(); // Reset styles

      if (draggedCard) {
        const taskId = draggedCard.dataset.id;
        const taskObj = tasks.find(t => t.id === taskId);

        if (taskObj) {
          // Move card to progress if it isn't already
          if (taskObj.status !== 'progress') {
            taskObj.status = 'progress';
            saveTasks();
          }

          // Force timer settings
          document.getElementById('timeInput').value = '25m';
          statusMessage.textContent = `Focusing on: ${taskObj.text}`;
          activeDragedTaskId = taskId; // Lock this task to the timer

          // Start the timer
          startTimer();
        }
      }
    }

    // Initialize Kanban
    renderTasks();

  </script>

  <audio id="alarm-sound">
    <source src="alarm_en.mp3" type="audio/mpeg" />
  </audio>
  <script>
    const langAudioMap = {
      'ka': 'alarm_ka.mp3',
      'es': 'alarm_es.mp3',
      'fr': 'alarm_fr.mp3',
      'en': 'alarm_en.mp3'
    };
    const userLang = (navigator.language || 'en').split('-')[0];
    const alarmAudio = document.getElementById("alarm-sound");
    alarmAudio.volume = 1.0;
    alarmAudio.src = langAudioMap[userLang] || langAudioMap['en'];

    // --- PWA Service Worker Registration ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((registration) => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          })
          .catch((err) => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
